                    errorCode: WAREHOUSE_NOT_FOUND
                    message: 指定された倉庫が見つかりません

    post:
      operationId: createOutboundSlip
      summary: 受注登録
      description: |
        新規の出荷受注を登録する。登録時のステータスはORDERED固定。
        伝票番号は自動採番される。
