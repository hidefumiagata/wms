    # ----------------------------------------------------------
    # 出荷管理 (Outbound) schemas
    # ----------------------------------------------------------
    OutboundSlipStatus:
      type: string
      enum:
        - ORDERED
        - PARTIAL_ALLOCATED
        - ALLOCATED
        - PICKING_COMPLETED
        - INSPECTING
        - SHIPPED
        - CANCELLED
      description: |
        受注ステータス
        - ORDERED: 受注済み
        - PARTIAL_ALLOCATED: 一部引当済み
        - ALLOCATED: 引当完了
        - PICKING_COMPLETED: ピッキング完了
        - INSPECTING: 検品中
        - SHIPPED: 出荷完了
        - CANCELLED: キャンセル

    OutboundSlipType:
      type: string
      enum:
        - NORMAL
        - WAREHOUSE_TRANSFER
      description: |
        出荷伝票種別
        - NORMAL: 通常出荷
        - WAREHOUSE_TRANSFER: 倉庫間移動

    OutboundLineStatus:
      type: string
      enum:
        - ORDERED
        - ALLOCATED
        - PICKING_COMPLETED
        - SHIPPED
        - CANCELLED
      description: |
        出荷明細ステータス
        - ORDERED: 受注済み
        - ALLOCATED: 引当完了
        - PICKING_COMPLETED: ピッキング完了
        - SHIPPED: 出荷完了
        - CANCELLED: キャンセル

    PickingInstructionStatus:
      type: string
      enum:
        - CREATED
        - IN_PROGRESS
        - COMPLETED
      description: |
        ピッキング指示ステータス
        - CREATED: 作成済み
        - IN_PROGRESS: 作業中
        - COMPLETED: 完了

    PickingLineStatus:
      type: string
      enum:
        - PENDING
        - COMPLETED
      description: |
        ピッキング明細ステータス
        - PENDING: 未ピッキング
        - COMPLETED: ピッキング完了

