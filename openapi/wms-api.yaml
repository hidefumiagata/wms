    put:
      operationId: updateLocation
      summary: ロケーション更新
      description: 指定IDのロケーションマスタを更新する。ロケーションコード・エリアIDは変更不可
      tags: [master-facility]
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLocationRequest'
      responses:
        '200':
          description: ロケーション更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationUpdateResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: ロケーションが存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          $ref: '#/components/responses/OptimisticLockConflict'

  /api/v1/master/locations/{id}/deactivate:
    patch:
      operationId: toggleLocationActive
      summary: ロケーション無効化／有効化
      description: 指定IDのロケーションの有効/無効を切り替える。在庫が存在する・棚卸中のロケーションは無効化不可
      tags: [master-facility]
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToggleActiveRequest'
      responses:
        '200':
          description: 無効化/有効化成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationToggleResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: ロケーションが存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          $ref: '#/components/responses/OptimisticLockConflict'
        '422':
          description: 在庫または棚卸中のため無効化不可
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                hasInventory:
                  value:
                    errorCode: CANNOT_DEACTIVATE_HAS_INVENTORY
                    message: 在庫が存在するため無効化できません
                stocktakeInProgress:
                  value:
                    errorCode: CANNOT_DEACTIVATE_STOCKTAKE_IN_PROGRESS
                    message: 棚卸中のため無効化できません

components:
  # ============================================================
  # Security Schemes
  # ============================================================
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: access_token
      description: JWTアクセストークン（httpOnly Cookie）

  # ============================================================
  # Schemas
  # ============================================================
  schemas:
    # --- Auth Request/Response ---

    LoginRequest:
      type: object
      required: [userCode, password]
      properties:
        userCode:
          type: string
          maxLength: 50
          description: ログインID
          example: admin001
        password:
          type: string
          maxLength: 255
          description: パスワード（平文）
          example: password123

    LoginResponse:
      type: object
      required: [userId, userCode, fullName, role, passwordChangeRequired]
      properties:
        userId:
          type: integer
          format: int64
          description: ユーザーID
          example: 1
        userCode:
          type: string
          description: ユーザーコード
          example: admin001
        fullName:
          type: string
          description: 氏名
          example: 山田 太郎
        role:
          $ref: '#/components/schemas/UserRole'
        passwordChangeRequired:
          type: boolean
          description: パスワード変更要求フラグ。trueの場合、フロントエンドはパスワード変更画面に遷移する
          example: false

    RefreshResponse:
      type: object
      required: [userId, userCode, fullName, role]
      properties:
        userId:
          type: integer
          format: int64
          description: ユーザーID
          example: 1
        userCode:
          type: string
          description: ユーザーコード
          example: admin001
        fullName:
          type: string
          description: 氏名
          example: 山田 太郎
        role:
          $ref: '#/components/schemas/UserRole'

    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          maxLength: 255
          description: 現在のパスワード（平文）
        newPassword:
          type: string
          maxLength: 255
          description: 新しいパスワード（平文）。パスワードポリシーを満たすこと

    PasswordResetRequestBody:
      type: object
      required: [identifier]
      properties:
        identifier:
          type: string
          maxLength: 255
          description: ユーザーコードまたはメールアドレス
          example: admin001

    PasswordResetConfirmRequest:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
          description: パスワードリセットトークン（メールで受信したURL内のトークン）
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        newPassword:
          type: string
          maxLength: 255
          description: 新しいパスワード（平文）。パスワードポリシーを満たすこと

    # --- System ---

    BusinessDateResponse:
      type: object
      required: [businessDate]
      properties:
        businessDate:
          type: string
          format: date
          description: 現在の営業日（yyyy-MM-dd形式）
          example: '2026-03-13'

    # --- Common ---

    UserRole:
      type: string
      enum: [SYSTEM_ADMIN, WAREHOUSE_MANAGER, WAREHOUSE_STAFF, VIEWER]
      description: ユーザーロール

    ErrorResponse:
      type: object
      required: [errorCode, message]
      properties:
        errorCode:
          type: string
          description: エラーコード
          example: VALIDATION_ERROR
        message:
          type: string
          description: エラーメッセージ
          example: 入力内容に誤りがあります
        details:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'
          description: フィールドレベルのバリデーションエラー詳細（VALIDATION_ERRORの場合のみ）

    FieldError:
      type: object
      required: [field, message]
      properties:
        field:
          type: string
          description: エラーが発生したフィールド名
          example: userCode
        message:
          type: string
          description: フィールドのエラーメッセージ
          example: 必須項目です

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          description: メッセージ

    ExistsResponse:
      type: object
      required: [exists]
      properties:
        exists:
          type: boolean
          description: 存在する場合true

    CountResponse:
      type: object
      required: [count]
      properties:
        count:
          type: integer
          description: 件数

    # --- Facility Master: Enums ---

    StorageCondition:
      type: string
      enum: [AMBIENT, REFRIGERATED, FROZEN]
      description: 保管条件（常温・冷蔵・冷凍）

    AreaType:
      type: string
      enum: [STOCK, INBOUND, OUTBOUND, RETURN]
      description: エリア種別（在庫・入荷・出荷・返品）

    # --- Facility Master: Common ---

    ToggleActiveRequest:
      type: object
      required: [isActive, version]
      properties:
        isActive:
          type: boolean
          description: falseで無効化、trueで有効化
        version:
          type: integer
          description: 楽観的ロックバージョン

    # --- Facility Master: Warehouse ---

    CreateWarehouseRequest:
      type: object
      required: [warehouseCode, warehouseName]
      properties:
        warehouseCode:
          type: string
          pattern: '^[A-Z]{4}$'
          description: 倉庫コード（英大文字4文字固定・登録後変更不可）
          example: WARA
        warehouseName:
          type: string
          maxLength: 200
          description: 倉庫名
          example: 東京DC
        warehouseNameKana:
          type: string
          maxLength: 200
          description: 倉庫名カナ
          example: トウキョウディーシー
        address:
          type: string
          maxLength: 500
          description: 住所
          example: 東京都江東区辰巳1-1-1

    UpdateWarehouseRequest:
      type: object
      required: [warehouseName, version]
      properties:
        warehouseName:
          type: string
          maxLength: 200
          description: 倉庫名
        warehouseNameKana:
          type: string
          maxLength: 200
          description: 倉庫名カナ
        address:
          type: string
          maxLength: 500
          description: 住所
        version:
          type: integer
          description: 楽観的ロックバージョン

    WarehouseDetail:
      type: object
      required: [id, warehouseCode, warehouseName, isActive, version, createdAt, updatedAt]
      properties:
        id:
          type: integer
          format: int64
        warehouseCode:
          type: string
        warehouseName:
          type: string
        warehouseNameKana:
          type: string
        address:
          type: string
        isActive:
          type: boolean
        version:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    WarehouseSimple:
      type: object
      required: [id, warehouseCode, warehouseName, isActive]
      properties:
        id:
          type: integer
          format: int64
        warehouseCode:
          type: string
        warehouseName:
          type: string
        isActive:
          type: boolean

    WarehousePageResponse:
      type: object
      required: [content, page, size, totalElements, totalPages]
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/WarehouseListItem'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer

    WarehouseListItem:
      type: object
      required: [id, warehouseCode, warehouseName, isActive, createdAt, updatedAt]
      properties:
        id:
          type: integer
          format: int64
        warehouseCode:
          type: string
        warehouseName:
          type: string
        warehouseNameKana:
          type: string
        address:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    WarehouseToggleResponse:
      type: object
      required: [id, warehouseCode, warehouseName, isActive, version, updatedAt]
      properties:
        id:
          type: integer
          format: int64
        warehouseCode:
          type: string
        warehouseName:
          type: string
        isActive:
          type: boolean
        version:
          type: integer
        updatedAt:
          type: string
          format: date-time

    # --- Facility Master: Building ---

    CreateBuildingRequest:
      type: object
      required: [warehouseId, buildingCode, buildingName]
      properties:
        warehouseId:
          type: integer
          format: int64
          description: 所属倉庫ID
        buildingCode:
          type: string
          maxLength: 10
          pattern: '^[A-Za-z0-9]+$'
          description: 棟コード（倉庫内一意・変更不可）
          example: A
        buildingName:
          type: string
          maxLength: 200
          description: 棟名称
          example: A棟

    UpdateBuildingRequest:
      type: object
      required: [buildingName, version]
      properties:
        buildingName:
          type: string
          maxLength: 200
          description: 棟名称
        version:
          type: integer
          description: 楽観的ロックバージョン

    BuildingDetail:
      type: object
      required: [id, buildingCode, buildingName, warehouseId, warehouseCode, isActive, version, createdAt, updatedAt]
      properties:
        id:
          type: integer
          format: int64
        buildingCode:
          type: string
        buildingName:
          type: string
        warehouseId:
          type: integer
          format: int64
        warehouseCode:
          type: string
        warehouseName:
          type: string
        isActive:
          type: boolean
        version:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BuildingPageResponse:
      type: object
      required: [content, page, size, totalElements, totalPages]
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/BuildingListItem'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer

    BuildingListItem:
      type: object
      required: [id, buildingCode, buildingName, warehouseId, warehouseCode, isActive, createdAt, updatedAt]
      properties:
        id:
          type: integer
          format: int64
        buildingCode:
          type: string
        buildingName:
          type: string
        warehouseId:
          type: integer
          format: int64
        warehouseCode:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BuildingToggleResponse:
      type: object
      required: [id, buildingCode, buildingName, isActive, version, updatedAt]
      properties:
        id:
          type: integer
          format: int64
        buildingCode:
          type: string
        buildingName:
          type: string
        isActive:
          type: boolean
        version:
          type: integer
        updatedAt:
          type: string
          format: date-time

    # --- Facility Master: Area ---

    CreateAreaRequest:
      type: object
      required: [buildingId, areaCode, areaName, storageCondition, areaType]
      properties:
        buildingId:
          type: integer
          format: int64
          description: 所属棟ID
        areaCode:
          type: string
          maxLength: 20
          pattern: '^[A-Za-z0-9\-]+$'
          description: エリアコード（棟内一意・変更不可）
          example: A01
        areaName:
          type: string
          maxLength: 200
          description: エリア名称
          example: A棟1階 常温エリア
        storageCondition:
          $ref: '#/components/schemas/StorageCondition'
        areaType:
          $ref: '#/components/schemas/AreaType'

    UpdateAreaRequest:
      type: object
      required: [areaName, storageCondition, version]
      properties:
        areaName:
          type: string
          maxLength: 200
