        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/allocation/release:
    post:
      operationId: releaseAllocation
      summary: 引当解放
      description: 引当済みの受注から引当を解放する。引当済み在庫を元に戻し、受注ステータスをORDEREDに戻す
      tags: [allocation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseAllocationRequest'
      responses:
        '200':
          description: 引当解放結果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AllocationReleaseResult'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: 出荷伝票が存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: ピッキング指示済み以降のため引当解放不可
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  # ============================================================
  # Security Schemes
  # ============================================================
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: access_token
      description: JWTアクセストークン（httpOnly Cookie）

  # ============================================================
  # Schemas
  # ============================================================
  schemas:
    # --- Auth Request/Response ---

    LoginRequest:
      type: object
      required: [userCode, password]
      properties:
        userCode:
          type: string
          maxLength: 50
          description: ログインID
          example: admin001
        password:
          type: string
          maxLength: 255
          description: パスワード（平文）
          example: password123

    LoginResponse:
      type: object
      required: [userId, userCode, fullName, role, passwordChangeRequired]
      properties:
        userId:
          type: integer
          format: int64
          description: ユーザーID
          example: 1
        userCode:
          type: string
          description: ユーザーコード
          example: admin001
        fullName:
          type: string
          description: 氏名
          example: 山田 太郎
        role:
          $ref: '#/components/schemas/UserRole'
        passwordChangeRequired:
          type: boolean
          description: パスワード変更要求フラグ。trueの場合、フロントエンドはパスワード変更画面に遷移する
          example: false

    RefreshResponse:
      type: object
      required: [userId, userCode, fullName, role]
      properties:
        userId:
          type: integer
          format: int64
          description: ユーザーID
          example: 1
        userCode:
          type: string
          description: ユーザーコード
          example: admin001
        fullName:
          type: string
          description: 氏名
          example: 山田 太郎
        role:
          $ref: '#/components/schemas/UserRole'

    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          maxLength: 255
          description: 現在のパスワード（平文）
        newPassword:
          type: string
          maxLength: 255
          description: 新しいパスワード（平文）。パスワードポリシーを満たすこと

    PasswordResetRequestBody:
      type: object
      required: [identifier]
      properties:
        identifier:
          type: string
          maxLength: 255
          description: ユーザーコードまたはメールアドレス
          example: admin001

    PasswordResetConfirmRequest:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
          description: パスワードリセットトークン（メールで受信したURL内のトークン）
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        newPassword:
          type: string
          maxLength: 255
          description: 新しいパスワード（平文）。パスワードポリシーを満たすこと

    # --- System ---

    BusinessDateResponse:
      type: object
      required: [businessDate]
      properties:
        businessDate:
          type: string
          format: date
          description: 現在の営業日（yyyy-MM-dd形式）
          example: '2026-03-13'

    # --- Common ---

    UserRole:
      type: string
      enum: [SYSTEM_ADMIN, WAREHOUSE_MANAGER, WAREHOUSE_STAFF, VIEWER]
      description: ユーザーロール

    ErrorResponse:
      type: object
      required: [errorCode, message]
      properties:
        errorCode:
          type: string
          description: エラーコード
          example: VALIDATION_ERROR
        message:
          type: string
          description: エラーメッセージ
          example: 入力内容に誤りがあります
        details:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'
          description: フィールドレベルのバリデーションエラー詳細（VALIDATION_ERRORの場合のみ）

    FieldError:
      type: object
      required: [field, message]
      properties:
        field:
          type: string
          description: エラーが発生したフィールド名
          example: userCode
        message:
          type: string
          description: フィールドのエラーメッセージ
          example: 必須項目です

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          description: メッセージ

    ExistsResponse:
      type: object
      required: [exists]
      properties:
        exists:
          type: boolean
          description: 存在する場合true

    CountResponse:
      type: object
      required: [count]
      properties:
        count:
          type: integer
          description: 件数

    # --- Facility Master: Enums ---

    StorageCondition:
      type: string
      enum: [AMBIENT, REFRIGERATED, FROZEN]
      description: 保管条件（常温・冷蔵・冷凍）

    AreaType:
      type: string
      enum: [STOCK, INBOUND, OUTBOUND, RETURN]
      description: エリア種別（在庫・入荷・出荷・返品）

    # --- Facility Master: Common ---

    ToggleActiveRequest:
      type: object
      required: [isActive, version]
      properties:
        isActive:
          type: boolean
          description: falseで無効化、trueで有効化
        version:
          type: integer
          description: 楽観的ロックバージョン

    # --- Facility Master: Warehouse ---

    CreateWarehouseRequest:
      type: object
      required: [warehouseCode, warehouseName]
      properties:
        warehouseCode:
          type: string
          pattern: '^[A-Z]{4}$'
          description: 倉庫コード（英大文字4文字固定・登録後変更不可）
          example: WARA
        warehouseName:
          type: string
          maxLength: 200
          description: 倉庫名
          example: 東京DC
        warehouseNameKana:
          type: string
          maxLength: 200
          description: 倉庫名カナ
          example: トウキョウディーシー
        address:
