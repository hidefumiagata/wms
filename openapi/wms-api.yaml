  # ============================================================
  # MASTER-USER - ユーザーマスタ
  # ============================================================

  /api/v1/master/users:
    get:
      operationId: listUsers
      summary: ユーザー一覧取得
      description: |
        システムに登録されている全ユーザーをページング形式で取得する。
        キーワード・ロール・ステータスでの絞り込み検索に対応する。
        SYSTEM_ADMINのみアクセス可能。
      tags: [master-user]
      parameters:
        - name: keyword
          in: query
          schema:
            type: string
          description: ユーザーコードまたは氏名で部分一致検索（大文字小文字不問）
        - name: role
          in: query
          schema:
            $ref: '#/components/schemas/UserRole'
          description: ロール絞り込み
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/UserStatus'
          description: ステータス絞り込み
        - name: all
          in: query
          schema:
            type: boolean
          description: trueの場合ページングなしで全件返却
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: sort
          in: query
          schema:
            type: string
            default: createdAt,desc
          description: ソート指定（例：userCode,asc / fullName,desc）
      responses:
        '200':
          description: ユーザー一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPageResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      operationId: createUser
      summary: ユーザー登録
      description: |
        新規ユーザーを登録する。初期パスワードをBCryptでハッシュ化して保存し、
        初回ログイン時にパスワード変更を強制するフラグをtrueにセットする。
        SYSTEM_ADMINのみアクセス可能。
      tags: [master-user]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: ユーザーコード重複
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                duplicateCode:
                  summary: ユーザーコード重複
                  value:
                    errorCode: DUPLICATE_CODE
                    message: 指定されたユーザーコードはすでに登録されています

  /api/v1/master/users/{id}:
    get:
      operationId: getUser
      summary: ユーザー取得
      description: 指定されたIDのユーザーを1件取得する。SYSTEM_ADMINのみアクセス可能。
      tags: [master-user]
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: ユーザー詳細
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: ユーザーが存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                userNotFound:
                  summary: ユーザー未存在
                  value:
                    errorCode: USER_NOT_FOUND
                    message: 指定されたユーザーが見つかりません

    put:
      operationId: updateUser
      summary: ユーザー更新
      description: |
        指定されたIDのユーザー情報を更新する。ユーザーコードは変更不可。
        自分自身のロール変更および無効化は禁止する。
        SYSTEM_ADMINのみアクセス可能。
      tags: [master-user]
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: ユーザーが存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                userNotFound:
                  summary: ユーザー未存在
                  value:
                    errorCode: USER_NOT_FOUND
                    message: 指定されたユーザーが見つかりません
        '409':
          $ref: '#/components/responses/OptimisticLockConflict'
        '422':
          description: 業務ルール違反
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                cannotChangeSelfRole:
                  summary: 自分自身のロール変更不可
                  value:
                    errorCode: CANNOT_CHANGE_SELF_ROLE
                    message: 自分自身のロールを変更することはできません
                cannotDeactivateSelf:
                  summary: 自分自身の無効化不可
                  value:
                    errorCode: CANNOT_DEACTIVATE_SELF
                    message: 自分自身を無効化することはできません

  /api/v1/master/users/{id}/deactivate:
    patch:
      operationId: toggleUserActive
      summary: ユーザー無効化/有効化
      description: |
        指定されたIDのユーザーの有効/無効フラグを切り替える。
        自分自身の無効化は禁止する。SYSTEM_ADMINのみアクセス可能。
      tags: [master-user]
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToggleActiveRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: ユーザーが存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                userNotFound:
                  summary: ユーザー未存在
                  value:
                    errorCode: USER_NOT_FOUND
                    message: 指定されたユーザーが見つかりません
        '409':
          $ref: '#/components/responses/OptimisticLockConflict'
        '422':
          description: 業務ルール違反
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                cannotDeactivateSelf:
                  summary: 自分自身の無効化不可
                  value:
                    errorCode: CANNOT_DEACTIVATE_SELF
                    message: 自分自身を無効化することはできません

  /api/v1/master/users/{id}/unlock:
    patch:
      operationId: unlockUser
      summary: アカウントロック解除
      description: |
        ログイン連続失敗によりロックされたユーザーのアカウントロックを解除する。
        locked・failed_login_count・locked_atを初期化する。
        冪等性あり（ロック解除済みのユーザーへの解除要求も204を返す）。
        SYSTEM_ADMINのみアクセス可能。
      tags: [master-user]
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: ロック解除成功（レスポンスボディなし）
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: ユーザーが存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                userNotFound:
                  summary: ユーザー未存在
                  value:
                    errorCode: USER_NOT_FOUND
                    message: 指定されたユーザーが見つかりません

  /api/v1/master/users/exists:
    get:
      operationId: checkUserCodeExists
      summary: ユーザーコード存在確認
      description: 指定されたユーザーコードがすでに登録されているか確認する。SYSTEM_ADMINのみアクセス可能。
      tags: [master-user]
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: チェック対象のユーザーコード
      responses:
        '200':
          description: 存在確認結果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExistsResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ============================================================
  # INBOUND - 入荷管理
  # ============================================================

  /api/v1/inbound/slips:
    get:
      operationId: listInboundSlips
      summary: 入荷予定一覧取得
      description: 指定倉庫の入荷予定伝票をページング形式で取得する。ステータス・入荷予定日・仕入先等の条件で絞り込みが可能。
      tags: [inbound]
      parameters:
        - name: warehouseId
          in: query
          required: true
          schema:
            type: integer
            format: int64
          description: 倉庫ID
        - name: slipNumber
          in: query
          schema:
            type: string
          description: 伝票番号（前方一致）
        - name: status
          in: query
          schema:
            type: array
            items:
              $ref: '#/components/schemas/InboundSlipStatus'
          description: ステータス（複数指定可）
        - name: plannedDateFrom
          in: query
          schema:
            type: string
            format: date
          description: 入荷予定日From（yyyy-MM-dd）
        - name: plannedDateTo
          in: query
          schema:
            type: string
            format: date
          description: 入荷予定日To（yyyy-MM-dd）
        - name: partnerId
          in: query
          schema:
            type: integer
            format: int64
          description: 仕入先ID
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: sort
          in: query
          schema:
            type: string
            default: plannedDate,asc
          description: ソート指定
      responses:
        '200':
          description: 入荷予定一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboundSlipSummaryPageResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: 倉庫が存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                warehouseNotFound:
                  summary: 倉庫未存在
                  value:
                    errorCode: WAREHOUSE_NOT_FOUND
                    message: 指定された倉庫が見つかりません

    post:
      operationId: createInboundSlip
      summary: 入荷予定登録
      description: |
        新しい入荷予定伝票をヘッダー情報と明細とともに登録する。
        登録時のステータスはPLANNEDで固定。伝票番号はシステムが自動採番する。
      tags: [inbound]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInboundSlipRequest'
      responses:
        '201':
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboundSlipDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: マスタ未存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                warehouseNotFound:
                  value:
                    errorCode: WAREHOUSE_NOT_FOUND
                    message: 指定された倉庫が見つかりません
                partnerNotFound:
                  value:
                    errorCode: PARTNER_NOT_FOUND
                    message: 指定された仕入先が見つかりません
                productNotFound:
                  value:
                    errorCode: PRODUCT_NOT_FOUND
                    message: 指定された商品が見つかりません
        '409':
          description: 重複エラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                duplicateProduct:
                  value:
                    errorCode: DUPLICATE_PRODUCT_IN_LINES
                    message: 同一伝票内に同じ商品が重複しています
        '422':
          description: 業務ルール違反
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                partnerNotSupplier:
                  value:
                    errorCode: INBOUND_PARTNER_NOT_SUPPLIER
                    message: 取引先種別が仕入先ではありません
                plannedDateTooEarly:
                  value:
                    errorCode: PLANNED_DATE_TOO_EARLY
                    message: 入荷予定日が現在営業日より前です
                lotNumberRequired:
                  value:
                    errorCode: LOT_NUMBER_REQUIRED
                    message: ロット管理対象商品にはロット番号が必須です
                expiryDateRequired:
                  value:
                    errorCode: EXPIRY_DATE_REQUIRED
                    message: 期限管理対象商品には賞味期限日が必須です

  /api/v1/inbound/slips/{id}:
    get:
      operationId: getInboundSlip
      summary: 入荷予定詳細取得
      description: 指定IDの入荷予定伝票のヘッダー情報と全明細（差異数含む）を取得する。
      tags: [inbound]
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: 入荷伝票詳細
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboundSlipDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: 伝票が存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notFound:
                  value:
                    errorCode: INBOUND_SLIP_NOT_FOUND
                    message: 指定された入荷伝票が見つかりません

    delete:
      operationId: deleteInboundSlip
      summary: 入荷予定削除
      description: ステータスがPLANNEDの入荷予定伝票を物理削除する。
      tags: [inbound]
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: 削除成功
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: 伝票が存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notFound:
                  value:
                    errorCode: INBOUND_SLIP_NOT_FOUND
                    message: 指定された入荷伝票が見つかりません
        '409':
          description: ステータスエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidStatus:
                  value:
                    errorCode: INBOUND_INVALID_STATUS
                    message: 現在のステータスではこの操作は実行できません

  /api/v1/inbound/slips/{id}/confirm:
    post:
      operationId: confirmInboundSlip
      summary: 入荷確認
      description: PLANNED状態の入荷予定伝票をCONFIRMED（入荷確認済）に遷移させる。
      tags: [inbound]
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: 確認成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboundSlipDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: 伝票が存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notFound:
                  value:
                    errorCode: INBOUND_SLIP_NOT_FOUND
                    message: 指定された入荷伝票が見つかりません
        '409':
          description: ステータスエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidStatus:
                  value:
                    errorCode: INBOUND_INVALID_STATUS
                    message: 現在のステータスではこの操作は実行できません

  /api/v1/inbound/slips/{id}/cancel:
    post:
      operationId: cancelInboundSlip
      summary: 入荷キャンセル
      description: |
        STORED・CANCELLED以外の入荷予定伝票をCANCELLEDに遷移させる。
        PARTIAL_STOREDの場合は入庫確定済み在庫を戻す処理を行う。
      tags: [inbound]
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: キャンセル成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboundSlipDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: 伝票が存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notFound:
                  value:
                    errorCode: INBOUND_SLIP_NOT_FOUND
                    message: 指定された入荷伝票が見つかりません
        '409':
          description: ステータスエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidStatus:
                  value:
                    errorCode: INBOUND_INVALID_STATUS
                    message: 現在のステータスではこの操作は実行できません

  /api/v1/inbound/slips/{id}/inspect:
    post:
      operationId: inspectInboundSlip
      summary: 検品登録
      description: |
        到着した入荷品を明細単位で検品し、実際の入荷数を記録する。
        初回呼び出し時にステータスがINSPECTINGに遷移する。検品数は再保存（上書き）可能。
      tags: [inbound]
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InspectInboundRequest'
      responses:
        '200':
          description: 検品登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboundSlipDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: 伝票または明細が存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                slipNotFound:
                  value:
                    errorCode: INBOUND_SLIP_NOT_FOUND
                    message: 指定された入荷伝票が見つかりません
                lineNotFound:
                  value:
                    errorCode: INBOUND_LINE_NOT_FOUND
                    message: 指定された入荷明細が見つかりません
        '409':
          description: ステータスエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidStatus:
                  value:
                    errorCode: INBOUND_INVALID_STATUS
                    message: 現在のステータスではこの操作は実行できません
        '422':
          description: 業務ルール違反
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                expiryDateExpired:
                  value:
                    errorCode: EXPIRY_DATE_EXPIRED
                    message: 賞味期限が営業日以前です

  /api/v1/inbound/slips/{id}/store:
    post:
      operationId: storeInboundSlip
      summary: 入庫確定
      description: |
        検品済み明細を指定ロケーションへ入庫確定する。
        確定と同時にinventoriesテーブルの在庫を加算し、inventory_movementsにINBOUNDレコードを追記する。
        全明細入庫完了でSTOREDに、一部の場合はPARTIAL_STOREDに遷移する。
      tags: [inbound]
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreInboundRequest'
      responses:
        '200':
          description: 入庫確定成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboundSlipDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: リソースが存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                slipNotFound:
                  value:
                    errorCode: INBOUND_SLIP_NOT_FOUND
                    message: 指定された入荷伝票が見つかりません
                lineNotFound:
                  value:
                    errorCode: INBOUND_LINE_NOT_FOUND
                    message: 指定された入荷明細が見つかりません
                locationNotFound:
                  value:
                    errorCode: LOCATION_NOT_FOUND
                    message: 指定されたロケーションが見つかりません
        '409':
          description: ステータスまたは在庫エラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidStatus:
                  value:
                    errorCode: INBOUND_INVALID_STATUS
                    message: 現在のステータスではこの操作は実行できません
                lineNotInspected:
                  value:
                    errorCode: INBOUND_LINE_NOT_INSPECTED
                    message: 対象明細が検品済みではありません
                stocktakeInProgress:
                  value:
                    errorCode: INVENTORY_STOCKTAKE_IN_PROGRESS
                    message: 指定ロケーションは棚卸中のためロックされています
        '422':
          description: 業務ルール違反
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                productMismatch:
                  value:
                    errorCode: LOCATION_PRODUCT_MISMATCH
                    message: 入庫先ロケーションに既に別商品の在庫が存在します
                areaMismatch:
                  value:
                    errorCode: INBOUND_LOCATION_AREA_MISMATCH
                    message: 指定ロケーションが入荷エリアに属していません

  /api/v1/inbound/results:
    get:
      operationId: listInboundResults
      summary: 入荷実績照会
      description: 入庫完了した入荷伝票の実績を明細レベルで照会する。
      tags: [inbound]
      parameters:
        - name: warehouseId
          in: query
          required: true
          schema:
            type: integer
            format: int64
          description: 倉庫ID
        - name: storedDateFrom
          in: query
          schema:
            type: string
            format: date
          description: 入庫日From（yyyy-MM-dd）。デフォルト：当月1日
        - name: storedDateTo
          in: query
          schema:
            type: string
            format: date
          description: 入庫日To（yyyy-MM-dd）。デフォルト：現在日
        - name: partnerId
          in: query
          schema:
            type: integer
            format: int64
          description: 仕入先ID
        - name: slipNumber
          in: query
          schema:
            type: string
          description: 伝票番号（前方一致）
        - name: productCode
          in: query
          schema:
            type: string
          description: 商品コード（前方一致）
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: sort
          in: query
          schema:
            type: string
            default: storedAt,desc
          description: ソート指定
      responses:
        '200':
          description: 入荷実績一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboundResultPageResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: 倉庫が存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                warehouseNotFound:
                  value:
                    errorCode: WAREHOUSE_NOT_FOUND
                    message: 指定された倉庫が見つかりません

  # ============================================================
  # INVENTORY - 在庫管理
  # ============================================================

  /api/v1/inventory:
    get:
      operationId: listInventory
      summary: 在庫一覧照会
      description: |
        倉庫の在庫を多軸条件で絞り込んで一覧取得する。
        ロケーション別明細表示（LOCATION）と商品別集計表示（PRODUCT_SUMMARY）の2モードを提供する。
      tags: [inventory]
      parameters:
        - name: warehouseId
          in: query
          required: true
          schema:
            type: integer
            format: int64
          description: 倉庫ID
        - name: locationCodePrefix
          in: query
          schema:
            type: string
          description: ロケーションコード前方一致フィルタ
        - name: productId
          in: query
          schema:
            type: integer
            format: int64
          description: 商品ID
        - name: unitType
          in: query
          schema:
            $ref: '#/components/schemas/UnitType'
          description: 荷姿
        - name: storageCondition
          in: query
          schema:
            $ref: '#/components/schemas/StorageCondition'
          description: 保管条件
        - name: viewType
          in: query
          schema:
            type: string
            enum: [LOCATION, PRODUCT_SUMMARY]
            default: LOCATION
          description: 表示モード
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: sort
          in: query
          schema:
            type: string
            default: locationCode,asc
          description: ソート指定
      responses:
        '200':
          description: |
            在庫一覧。viewTypeにより返却スキーマが異なる。
            LOCATION: InventoryLocationPageResponse
            PRODUCT_SUMMARY: InventoryProductSummaryPageResponse
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/InventoryLocationPageResponse'
                  - $ref: '#/components/schemas/InventoryProductSummaryPageResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: 倉庫が存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                warehouseNotFound:
                  value:
                    errorCode: WAREHOUSE_NOT_FOUND
                    message: 指定された倉庫が見つかりません

  /api/v1/inventory/move:
    post:
      operationId: moveInventory
      summary: 在庫移動登録
      description: 指定した在庫を移動元ロケーションから移動先ロケーションへ移動する。
      tags: [inventory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveInventoryRequest'
      responses:
        '200':
          description: 移動成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MoveInventoryResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: リソースが存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                locationNotFound:
                  value:
                    errorCode: LOCATION_NOT_FOUND
                    message: 指定されたロケーションが見つかりません
                inventoryNotFound:
                  value:
                    errorCode: INVENTORY_NOT_FOUND
                    message: 移動元に対象在庫が存在しません
        '409':
          description: 棚卸ロック中
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                stocktakeLock:
                  value:
                    errorCode: INVENTORY_STOCKTAKE_IN_PROGRESS
                    message: 棚卸ロック中のため操作できません
        '422':
          description: 業務ルール違反
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                insufficient:
                  value:
                    errorCode: INVENTORY_INSUFFICIENT
                    message: 在庫数が不足しています
                capacityExceeded:
                  value:
                    errorCode: INVENTORY_CAPACITY_EXCEEDED
                    message: 移動先ロケーションの収容数を超過します
                productMismatch:
                  value:
                    errorCode: LOCATION_PRODUCT_MISMATCH
                    message: 移動先ロケーションに既に別商品の在庫が存在します

  /api/v1/inventory/breakdown:
    post:
      operationId: breakdownInventory
      summary: ばらし登録
      description: |
        ケースをボール/バラへ、ボールをバラへ変換（ばらし）する。
        変換レートは商品マスタのcase_quantity/ball_quantityを参照する。
      tags: [inventory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BreakdownInventoryRequest'
      responses:
        '200':
          description: ばらし成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BreakdownInventoryResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: リソースが存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                locationNotFound:
                  value:
                    errorCode: LOCATION_NOT_FOUND
                    message: 指定されたロケーションが見つかりません
                inventoryNotFound:
                  value:
                    errorCode: INVENTORY_NOT_FOUND
                    message: ばらし元に対象在庫が存在しません
        '409':
          description: 棚卸ロック中
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                stocktakeLock:
                  value:
                    errorCode: INVENTORY_STOCKTAKE_IN_PROGRESS
                    message: 棚卸ロック中のため操作できません
        '422':
          description: 業務ルール違反
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                insufficient:
                  value:
                    errorCode: INVENTORY_INSUFFICIENT
                    message: 在庫数が不足しています
                capacityExceeded:
                  value:
                    errorCode: INVENTORY_CAPACITY_EXCEEDED
                    message: ばらし先ロケーションの収容数を超過します
                conversionFraction:
                  value:
                    errorCode: BREAKDOWN_CONVERSION_FRACTION
                    message: 変換後数量に端数が発生しました

  /api/v1/inventory/correction:
    post:
      operationId: correctInventory
      summary: 在庫訂正登録
      description: |
        指定した在庫の数量を直接指定の数量に訂正する。訂正理由の記録が必須。
        SYSTEM_ADMINまたはWAREHOUSE_MANAGERのみ実行可能。
      tags: [inventory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CorrectionInventoryRequest'
      responses:
        '200':
          description: 訂正成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CorrectionInventoryResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: リソースが存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                locationNotFound:
                  value:
                    errorCode: LOCATION_NOT_FOUND
                    message: 指定されたロケーションが見つかりません
                inventoryNotFound:
                  value:
                    errorCode: INVENTORY_NOT_FOUND
                    message: 対象在庫レコードが存在しません
        '409':
          description: 棚卸ロック中
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                stocktakeLock:
                  value:
                    errorCode: INVENTORY_STOCKTAKE_IN_PROGRESS
                    message: 棚卸ロック中のため操作できません
        '422':
          description: 業務ルール違反
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                belowAllocated:
                  value:
                    errorCode: CORRECTION_BELOW_ALLOCATED
                    message: 訂正後の数量が引当数を下回っています

  /api/v1/inventory/stocktakes:
    get:
      operationId: listStocktakes
      summary: 棚卸一覧取得
      description: 棚卸の一覧を取得する。ステータスや倉庫で絞り込み可能。
      tags: [inventory]
      parameters:
        - name: warehouseId
          in: query
          required: true
          schema:
            type: integer
            format: int64
          description: 倉庫ID
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/StocktakeStatus'
          description: ステータス絞り込み
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
          description: 棚卸開始日From
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
          description: 棚卸開始日To
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: sort
          in: query
          schema:
            type: string
            default: startedAt,desc
          description: ソート指定
      responses:
        '200':
          description: 棚卸一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StocktakeSummaryPageResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: 倉庫が存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                warehouseNotFound:
                  value:
                    errorCode: WAREHOUSE_NOT_FOUND
                    message: 指定された倉庫が見つかりません

    post:
      operationId: startStocktake
      summary: 棚卸開始
      description: |
        指定した棟・エリア範囲の在庫スナップショットを取得して棚卸を開始する。
        棚卸開始と同時に対象ロケーションに棚卸ロックをかける。
        SYSTEM_ADMINまたはWAREHOUSE_MANAGERのみ実行可能。
      tags: [inventory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartStocktakeRequest'
      responses:
        '201':
          description: 棚卸開始成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartStocktakeResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: マスタが存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                warehouseNotFound:
                  value:
                    errorCode: WAREHOUSE_NOT_FOUND
                    message: 指定された倉庫が見つかりません
                buildingNotFound:
                  value:
                    errorCode: BUILDING_NOT_FOUND
                    message: 指定された棟が見つかりません
                areaNotFound:
                  value:
                    errorCode: AREA_NOT_FOUND
                    message: 指定されたエリアが見つかりません
        '409':
          description: 棚卸ロック競合
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                stocktakeInProgress:
                  value:
                    errorCode: INVENTORY_STOCKTAKE_IN_PROGRESS
                    message: 同一ロケーション範囲に実施中の棚卸が存在します

  /api/v1/inventory/stocktakes/{id}:
    get:
      operationId: getStocktake
      summary: 棚卸詳細取得
      description: 指定した棚卸のヘッダ情報と明細一覧（ページング付き）を返す。
      tags: [inventory]
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - name: isCounted
          in: query
          schema:
            type: boolean
          description: 実数入力済み絞り込み（true=入力済み, false=未入力）
        - name: locationCodePrefix
          in: query
          schema:
            type: string
          description: ロケーションコード前方一致
        - $ref: '#/components/parameters/PageParam'
        - name: size
          in: query
          schema:
            type: integer
            default: 50
          description: 1ページあたりの件数
      responses:
        '200':
          description: 棚卸詳細
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StocktakeDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: 棚卸が存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notFound:
                  value:
                    errorCode: STOCKTAKE_NOT_FOUND
                    message: 指定された棚卸が見つかりません

  /api/v1/inventory/stocktakes/{id}/lines:
    put:
      operationId: saveStocktakeLines
      summary: 棚卸実数入力・一時保存
      description: |
        棚卸実施中（STARTED）の棚卸に対して、実測した在庫数（実数）を入力・保存する。
        複数明細を一括保存可能。確定（API-INV-015）までは在庫数量は変更されない。
      tags: [inventory]
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveStocktakeLinesRequest'
      responses:
        '200':
          description: 保存成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveStocktakeLinesResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: 棚卸または明細が存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                stocktakeNotFound:
                  value:
                    errorCode: STOCKTAKE_NOT_FOUND
                    message: 指定された棚卸が見つかりません
                lineNotFound:
                  value:
                    errorCode: STOCKTAKE_LINE_NOT_FOUND
                    message: 指定された棚卸明細が見つかりません
        '409':
          description: ステータスエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidStatus:
                  value:
                    errorCode: STOCKTAKE_INVALID_STATUS
                    message: 棚卸が実施中ではないため操作できません

  /api/v1/inventory/stocktakes/{id}/confirm:
    post:
      operationId: confirmStocktake
      summary: 棚卸確定
      description: |
        棚卸（STARTED）を確定する。全明細の実数入力済みを確認した上で、
        在庫数量を実数に更新し、差異をinventory_movementsに記録する。棚卸ロックを解除する。
        SYSTEM_ADMINまたはWAREHOUSE_MANAGERのみ実行可能。
      tags: [inventory]
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: 棚卸確定成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfirmStocktakeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: 棚卸が存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notFound:
                  value:
                    errorCode: STOCKTAKE_NOT_FOUND
                    message: 指定された棚卸が見つかりません
        '409':
          description: ステータスエラーまたは未入力あり
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidStatus:
                  value:
                    errorCode: STOCKTAKE_INVALID_STATUS
                    message: 棚卸が実施中ではないため操作できません
                notAllCounted:
                  value:
                    errorCode: INVENTORY_STOCKTAKE_NOT_ALL_COUNTED
                    message: 未入力の実数があります

  # ============================================================
  # OUTBOUND - 出荷管理
  # ============================================================

  /api/v1/outbound/slips:
    get:
      operationId: listOutboundSlips
      summary: 受注一覧取得
      description: 出荷伝票（受注）の一覧をページング形式で取得する。倉庫ID必須。
      tags: [outbound]
      parameters:
        - name: warehouseId
          in: query
          required: true
          schema:
            type: integer
            format: int64
          description: 倉庫ID
        - name: slipNumber
          in: query
          schema:
            type: string
          description: 伝票番号（前方一致）
        - name: plannedDateFrom
          in: query
          schema:
            type: string
            format: date
