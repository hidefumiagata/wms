openapi: 3.1.0
info:
  title: WMS ShowCase API
  description: 倉庫管理システム（WMS）ShowCase のREST API定義
  version: 0.1.0
  contact:
    name: WMS ShowCase Project

servers:
  - url: http://localhost:8080
    description: ローカル開発環境
  - url: https://{environment}.azurecontainerapps.io
    description: Azure Container Apps
    variables:
      environment:
        default: wms-showcase

tags:
  - name: auth
    description: 認証・認可
  - name: system
    description: システム共通
  - name: master-facility
    description: 施設マスタ（倉庫・棟・エリア・ロケーション）
  - name: master-partner
    description: 取引先マスタ
  - name: master-product
    description: 商品マスタ
  - name: master-user
    description: ユーザーマスタ
  - name: inbound
    description: 入荷管理
  - name: inventory
    description: 在庫管理
  - name: outbound
    description: 出荷管理
  - name: batch
    description: バッチ管理
  - name: report
    description: レポート出力
  - name: system-parameter
    description: システムパラメータ
  - name: allocation
    description: 在庫引当

paths:
  # ============================================================
  # AUTH - 認証・認可
  # ============================================================

  /api/v1/auth/login:
    post:
      operationId: login
      summary: ログイン
      description: ユーザーコードとパスワードで認証し、JWTアクセストークンおよびリフレッシュトークンをhttpOnlyクッキーにセットして返す
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: ログイン成功
          headers:
            Set-Cookie:
              description: access_token および refresh_token をhttpOnly Cookieとしてセット
              schema:
                type: string
                examples:
                  - access_token=eyJhbGciOiJIUzI1NiJ9...; HttpOnly; SameSite=Lax; Path=/; Max-Age=3600
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          description: 認証失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidCredentials:
                  summary: ユーザーコード不存在またはパスワード不一致
                  value:
                    errorCode: INVALID_CREDENTIALS
                    message: ユーザーコードまたはパスワードが正しくありません
                accountLocked:
                  summary: アカウントロック
                  value:
                    errorCode: ACCOUNT_LOCKED
                    message: アカウントがロックされています
                accountInactive:
                  summary: アカウント無効
                  value:
                    errorCode: ACCOUNT_INACTIVE
                    message: アカウントが無効化されています

  /api/v1/auth/logout:
    post:
      operationId: logout
      summary: ログアウト
      description: サーバー側のリフレッシュトークンを削除し、クライアント側のCookieを無効化する
      tags: [auth]
      security:
        - cookieAuth: []
      responses:
        '204':
          description: ログアウト成功
          headers:
            Set-Cookie:
              description: access_token および refresh_token を Max-Age=0 で無効化
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/refresh:
    post:
      operationId: refreshToken
      summary: トークンリフレッシュ
      description: refresh_token Cookieを検証し、新しいアクセストークンとリフレッシュトークンを発行する（トークンローテーション）
      tags: [auth]
      security: []
      parameters:
        - name: refresh_token
          in: cookie
          required: true
          schema:
            type: string
      responses:
        '200':
          description: トークンリフレッシュ成功
          headers:
            Set-Cookie:
              description: 新しい access_token および refresh_token をhttpOnly Cookieとしてセット
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          description: リフレッシュ失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unauthorized:
                  summary: refresh_token Cookieが存在しない
                  value:
                    errorCode: UNAUTHORIZED
                    message: 認証が必要です
                tokenExpired:
                  summary: リフレッシュトークン期限切れまたは無効
                  value:
                    errorCode: REFRESH_TOKEN_EXPIRED
                    message: リフレッシュトークンが期限切れです。再ログインしてください

  /api/v1/auth/change-password:
    post:
      operationId: changePassword
      summary: パスワード変更
      description: 現在のパスワードを確認した上で新しいパスワードに変更する。初回ログイン時のパスワード変更にも使用する
      tags: [auth]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          description: パスワード変更成功
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          description: 認証失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unauthorized:
                  summary: access_token が無効
                  value:
                    errorCode: UNAUTHORIZED
                    message: 認証が必要です
                invalidCredentials:
                  summary: 現在のパスワードが不一致
                  value:
                    errorCode: INVALID_CREDENTIALS
                    message: 現在のパスワードが正しくありません
                accountLocked:
                  summary: パスワード連続失敗によるロック
                  value:
                    errorCode: ACCOUNT_LOCKED
                    message: アカウントがロックされています
        '409':
          description: 新旧パスワード同一
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                samePassword:
                  value:
                    errorCode: SAME_PASSWORD
                    message: 新しいパスワードは現在のパスワードと異なるものを設定してください

  /api/v1/auth/password-reset/request:
    post:
      operationId: requestPasswordReset
      summary: パスワードリセット申請
      description: ユーザーコードまたはメールアドレスを受け取り、該当ユーザーにパスワードリセット用のメールを送信する。セキュリティ上、ユーザーの存在有無にかかわらず常に同一のレスポンスを返す
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestBody'
      responses:
        '200':
          description: パスワードリセット申請受付（ユーザー存在有無にかかわらず同一レスポンス）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              examples:
                success:
                  value:
                    message: If the account exists, a password reset email has been sent.
        '400':
          $ref: '#/components/responses/ValidationError'
        '429':
          description: レートリミット超過
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                rateLimited:
                  value:
                    errorCode: RATE_LIMIT_EXCEEDED
                    message: リクエスト回数の上限を超えました。しばらく待ってから再度お試しください

  /api/v1/auth/password-reset/confirm:
    post:
      operationId: confirmPasswordReset
      summary: パスワード再設定
      description: パスワードリセットトークンを検証し、新しいパスワードを設定する。成功時にはアカウントロックの解除と失敗カウンタのリセットも実施する
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
      responses:
        '200':
          description: パスワード再設定成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              examples:
                success:
                  value:
                    message: Password has been reset successfully.
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          description: トークン無効
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidToken:
                  value:
                    errorCode: INVALID_TOKEN
                    message: トークンが無効または期限切れです

  # ============================================================
  # SYSTEM - システム共通
  # ============================================================

  /api/v1/system/business-date:
    get:
      operationId: getBusinessDate
      summary: 営業日取得
      description: システムで管理している現在の営業日を取得する
      tags: [system]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: 営業日取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessDateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          description: システム異常（営業日レコード未設定）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                internalError:
                  value:
                    errorCode: INTERNAL_SERVER_ERROR
                    message: システムエラーが発生しました

  # ============================================================
  # MASTER-FACILITY - 施設マスタ
  # ============================================================

  # --- Warehouses ---

  /api/v1/master/warehouses:
    get:
      operationId: listWarehouses
      summary: 倉庫一覧取得
      description: 倉庫マスタの一覧を取得する。`all=true`でプルダウン用の全件取得も可能
      tags: [master-facility]
      parameters:
        - name: warehouseCode
          in: query
          schema:
            type: string
            maxLength: 50
          description: 倉庫コード（前方一致）
        - name: warehouseName
          in: query
          schema:
            type: string
            maxLength: 200
          description: 倉庫名（部分一致）
        - name: isActive
          in: query
          schema:
            type: boolean
          description: 有効/無効フィルタ。省略時は全件
        - name: all
          in: query
          schema:
            type: boolean
          description: trueの場合ページングなしで全件返却（プルダウン用）
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: sort
          in: query
          schema:
            type: string
            default: warehouseCode,asc
          description: ソート条件
      responses:
        '200':
          description: 倉庫一覧取得成功
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/WarehousePageResponse'
                  - type: array
                    items:
                      $ref: '#/components/schemas/WarehouseSimple'
        '400':
          $ref: '#/components/responses/InvalidParameter'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createWarehouse
      summary: 倉庫登録
      description: 倉庫マスタに新規倉庫を登録する
      tags: [master-facility]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWarehouseRequest'
      responses:
        '201':
          description: 倉庫登録成功
          headers:
            Location:
              description: 作成されたリソースのURL
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarehouseDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: 倉庫コード重複
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                duplicateCode:
                  value:
                    errorCode: DUPLICATE_CODE
                    message: 指定された倉庫コードは既に使用されています

  /api/v1/master/warehouses/{id}:
    get:
      operationId: getWarehouse
      summary: 倉庫取得
      description: 指定IDの倉庫マスタを1件取得する
      tags: [master-facility]
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: 倉庫取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarehouseDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: 倉庫が存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notFound:
                  value:
                    errorCode: WAREHOUSE_NOT_FOUND
                    message: 指定された倉庫が見つかりません
    put:
      operationId: updateWarehouse
      summary: 倉庫更新
      description: 指定IDの倉庫マスタを更新する。倉庫コードは変更不可
      tags: [master-facility]
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWarehouseRequest'
      responses:
        '200':
          description: 倉庫更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarehouseDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: 倉庫が存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          $ref: '#/components/responses/OptimisticLockConflict'

  /api/v1/master/warehouses/{id}/deactivate:
    patch:
      operationId: toggleWarehouseActive
      summary: 倉庫無効化／有効化
      description: 指定IDの倉庫の有効/無効を切り替える。在庫が存在する倉庫は無効化不可
      tags: [master-facility]
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToggleActiveRequest'
      responses:
        '200':
          description: 無効化/有効化成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarehouseToggleResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: 倉庫が存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          $ref: '#/components/responses/OptimisticLockConflict'
        '422':
          description: 在庫が存在するため無効化不可
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                hasInventory:
                  value:
                    errorCode: CANNOT_DEACTIVATE_HAS_INVENTORY
                    message: 在庫が存在するため無効化できません

  /api/v1/master/warehouses/exists:
    get:
      operationId: checkWarehouseCodeExists
      summary: 倉庫コード存在確認
      description: 指定された倉庫コードがすでに登録されているか確認する
      tags: [master-facility]
      parameters:
        - name: warehouseCode
          in: query
          required: true
          schema:
            type: string
          description: チェック対象の倉庫コード
      responses:
        '200':
          description: 存在確認結果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExistsResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # --- Buildings ---

  /api/v1/master/buildings:
    get:
      operationId: listBuildings
      summary: 棟一覧取得
      description: 指定倉庫に属する棟の一覧を取得する
      tags: [master-facility]
      parameters:
        - name: warehouseId
          in: query
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
          description: 対象の倉庫ID
        - name: buildingCode
          in: query
          schema:
            type: string
            maxLength: 10
          description: 棟コード（前方一致）
        - name: isActive
          in: query
          schema:
            type: boolean
          description: 有効/無効フィルタ
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: 棟一覧取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuildingPageResponse'
        '400':
          $ref: '#/components/responses/InvalidParameter'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: 指定倉庫が存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: createBuilding
      summary: 棟登録
      description: 棟マスタに新規棟を登録する
      tags: [master-facility]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBuildingRequest'
      responses:
        '201':
          description: 棟登録成功
          headers:
            Location:
              description: 作成されたリソースのURL
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuildingDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: 指定倉庫が存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 棟コード重複
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                duplicateCode:
                  value:
                    errorCode: DUPLICATE_CODE
                    message: 同一倉庫内に同じ棟コードが既に存在します

  /api/v1/master/buildings/{id}:
    get:
      operationId: getBuilding
      summary: 棟取得
      description: 指定IDの棟マスタを1件取得する
      tags: [master-facility]
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: 棟取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuildingDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: 棟が存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notFound:
                  value:
                    errorCode: BUILDING_NOT_FOUND
                    message: 指定された棟が見つかりません
    put:
      operationId: updateBuilding
      summary: 棟更新
      description: 指定IDの棟マスタを更新する。棟コード・倉庫IDは変更不可
      tags: [master-facility]
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBuildingRequest'
      responses:
        '200':
          description: 棟更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuildingDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: 棟が存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          $ref: '#/components/responses/OptimisticLockConflict'

  /api/v1/master/buildings/{id}/deactivate:
    patch:
      operationId: toggleBuildingActive
      summary: 棟無効化／有効化
      description: 指定IDの棟の有効/無効を切り替える。配下にエリアが存在する棟は無効化不可
      tags: [master-facility]
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToggleActiveRequest'
      responses:
        '200':
          description: 無効化/有効化成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuildingToggleResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: 棟が存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          $ref: '#/components/responses/OptimisticLockConflict'
        '422':
          description: 配下にエリアが存在するため無効化不可
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                hasChildren:
                  value:
                    errorCode: CANNOT_DEACTIVATE_HAS_CHILDREN
                    message: 配下にエリアが存在するため無効化できません

  # --- Areas ---

  /api/v1/master/areas:
    get:
      operationId: listAreas
      summary: エリア一覧取得
      description: エリアマスタの一覧を取得する
      tags: [master-facility]
      parameters:
        - name: warehouseId
          in: query
          schema:
            type: integer
            format: int64
            minimum: 1
          description: 倉庫IDで絞り込み
        - name: buildingId
          in: query
          schema:
            type: integer
            format: int64
            minimum: 1
          description: 棟IDで絞り込み
        - name: storageCondition
          in: query
          schema:
            $ref: '#/components/schemas/StorageCondition'
          description: 保管条件フィルタ
        - name: areaType
          in: query
          schema:
            $ref: '#/components/schemas/AreaType'
          description: エリア種別フィルタ
        - name: isActive
          in: query
          schema:
            type: boolean
          description: 有効/無効フィルタ
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: エリア一覧取得成功
          content:
            application/json:
              schema:
