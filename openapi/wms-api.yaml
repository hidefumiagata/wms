  # ============================================================
  # MASTER-USER - ユーザーマスタ
  # ============================================================

  /api/v1/master/users:
    get:
      operationId: listUsers
      summary: ユーザー一覧取得
      description: |
        システムに登録されている全ユーザーをページング形式で取得する。
        キーワード・ロール・ステータスでの絞り込み検索に対応する。
        SYSTEM_ADMINのみアクセス可能。
      tags: [master-user]
      parameters:
        - name: keyword
          in: query
          schema:
            type: string
          description: ユーザーコードまたは氏名で部分一致検索（大文字小文字不問）
        - name: role
          in: query
          schema:
            $ref: '#/components/schemas/UserRole'
          description: ロール絞り込み
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/UserStatus'
          description: ステータス絞り込み
        - name: all
          in: query
          schema:
            type: boolean
          description: trueの場合ページングなしで全件返却
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: sort
          in: query
          schema:
            type: string
            default: createdAt,desc
          description: ソート指定（例：userCode,asc / fullName,desc）
      responses:
        '200':
          description: ユーザー一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPageResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      operationId: createUser
      summary: ユーザー登録
      description: |
        新規ユーザーを登録する。初期パスワードをBCryptでハッシュ化して保存し、
        初回ログイン時にパスワード変更を強制するフラグをtrueにセットする。
        SYSTEM_ADMINのみアクセス可能。
      tags: [master-user]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: ユーザーコード重複
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                duplicateCode:
                  summary: ユーザーコード重複
                  value:
                    errorCode: DUPLICATE_CODE
                    message: 指定されたユーザーコードはすでに登録されています

  /api/v1/master/users/{id}:
    get:
      operationId: getUser
      summary: ユーザー取得
      description: 指定されたIDのユーザーを1件取得する。SYSTEM_ADMINのみアクセス可能。
      tags: [master-user]
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: ユーザー詳細
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: ユーザーが存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                userNotFound:
                  summary: ユーザー未存在
                  value:
                    errorCode: USER_NOT_FOUND
                    message: 指定されたユーザーが見つかりません

    put:
      operationId: updateUser
      summary: ユーザー更新
      description: |
        指定されたIDのユーザー情報を更新する。ユーザーコードは変更不可。
        自分自身のロール変更および無効化は禁止する。
        SYSTEM_ADMINのみアクセス可能。
      tags: [master-user]
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: ユーザーが存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                userNotFound:
                  summary: ユーザー未存在
                  value:
                    errorCode: USER_NOT_FOUND
                    message: 指定されたユーザーが見つかりません
        '409':
          $ref: '#/components/responses/OptimisticLockConflict'
        '422':
          description: 業務ルール違反
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                cannotChangeSelfRole:
                  summary: 自分自身のロール変更不可
                  value:
                    errorCode: CANNOT_CHANGE_SELF_ROLE
                    message: 自分自身のロールを変更することはできません
                cannotDeactivateSelf:
                  summary: 自分自身の無効化不可
                  value:
                    errorCode: CANNOT_DEACTIVATE_SELF
                    message: 自分自身を無効化することはできません

  /api/v1/master/users/{id}/deactivate:
    patch:
      operationId: toggleUserActive
      summary: ユーザー無効化/有効化
      description: |
        指定されたIDのユーザーの有効/無効フラグを切り替える。
        自分自身の無効化は禁止する。SYSTEM_ADMINのみアクセス可能。
      tags: [master-user]
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToggleActiveRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: ユーザーが存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                userNotFound:
                  summary: ユーザー未存在
                  value:
                    errorCode: USER_NOT_FOUND
                    message: 指定されたユーザーが見つかりません
        '409':
          $ref: '#/components/responses/OptimisticLockConflict'
        '422':
          description: 業務ルール違反
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                cannotDeactivateSelf:
                  summary: 自分自身の無効化不可
                  value:
                    errorCode: CANNOT_DEACTIVATE_SELF
                    message: 自分自身を無効化することはできません

  /api/v1/master/users/{id}/unlock:
    patch:
      operationId: unlockUser
      summary: アカウントロック解除
      description: |
        ログイン連続失敗によりロックされたユーザーのアカウントロックを解除する。
        locked・failed_login_count・locked_atを初期化する。
        冪等性あり（ロック解除済みのユーザーへの解除要求も204を返す）。
        SYSTEM_ADMINのみアクセス可能。
      tags: [master-user]
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: ロック解除成功（レスポンスボディなし）
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: ユーザーが存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                userNotFound:
                  summary: ユーザー未存在
                  value:
                    errorCode: USER_NOT_FOUND
                    message: 指定されたユーザーが見つかりません

  /api/v1/master/users/exists:
    get:
      operationId: checkUserCodeExists
      summary: ユーザーコード存在確認
      description: 指定されたユーザーコードがすでに登録されているか確認する。SYSTEM_ADMINのみアクセス可能。
      tags: [master-user]
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: チェック対象のユーザーコード
      responses:
        '200':
          description: 存在確認結果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExistsResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ============================================================
  # INBOUND - 入荷管理
  # ============================================================

  /api/v1/inbound/slips:
    get:
      operationId: listInboundSlips
      summary: 入荷予定一覧取得
      description: 指定倉庫の入荷予定伝票をページング形式で取得する。ステータス・入荷予定日・仕入先等の条件で絞り込みが可能。
      tags: [inbound]
      parameters:
        - name: warehouseId
          in: query
          required: true
          schema:
            type: integer
            format: int64
          description: 倉庫ID
        - name: slipNumber
          in: query
          schema:
            type: string
          description: 伝票番号（前方一致）
        - name: status
          in: query
          schema:
            type: array
            items:
              $ref: '#/components/schemas/InboundSlipStatus'
          description: ステータス（複数指定可）
        - name: plannedDateFrom
          in: query
          schema:
            type: string
            format: date
          description: 入荷予定日From（yyyy-MM-dd）
        - name: plannedDateTo
          in: query
          schema:
            type: string
            format: date
          description: 入荷予定日To（yyyy-MM-dd）
        - name: partnerId
          in: query
          schema:
            type: integer
            format: int64
          description: 仕入先ID
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: sort
          in: query
          schema:
            type: string
            default: plannedDate,asc
          description: ソート指定
      responses:
        '200':
          description: 入荷予定一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboundSlipSummaryPageResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: 倉庫が存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                warehouseNotFound:
                  summary: 倉庫未存在
                  value:
                    errorCode: WAREHOUSE_NOT_FOUND
                    message: 指定された倉庫が見つかりません

    post:
      operationId: createInboundSlip
      summary: 入荷予定登録
      description: |
        新しい入荷予定伝票をヘッダー情報と明細とともに登録する。
        登録時のステータスはPLANNEDで固定。伝票番号はシステムが自動採番する。
      tags: [inbound]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInboundSlipRequest'
      responses:
        '201':
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboundSlipDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: マスタ未存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                warehouseNotFound:
                  value:
                    errorCode: WAREHOUSE_NOT_FOUND
                    message: 指定された倉庫が見つかりません
                partnerNotFound:
                  value:
                    errorCode: PARTNER_NOT_FOUND
                    message: 指定された仕入先が見つかりません
                productNotFound:
                  value:
                    errorCode: PRODUCT_NOT_FOUND
                    message: 指定された商品が見つかりません
        '409':
          description: 重複エラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                duplicateProduct:
                  value:
                    errorCode: DUPLICATE_PRODUCT_IN_LINES
                    message: 同一伝票内に同じ商品が重複しています
        '422':
          description: 業務ルール違反
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                partnerNotSupplier:
                  value:
                    errorCode: INBOUND_PARTNER_NOT_SUPPLIER
                    message: 取引先種別が仕入先ではありません
                plannedDateTooEarly:
                  value:
                    errorCode: PLANNED_DATE_TOO_EARLY
                    message: 入荷予定日が現在営業日より前です
                lotNumberRequired:
                  value:
                    errorCode: LOT_NUMBER_REQUIRED
                    message: ロット管理対象商品にはロット番号が必須です
                expiryDateRequired:
                  value:
                    errorCode: EXPIRY_DATE_REQUIRED
                    message: 期限管理対象商品には賞味期限日が必須です

  /api/v1/inbound/slips/{id}:
    get:
      operationId: getInboundSlip
      summary: 入荷予定詳細取得
      description: 指定IDの入荷予定伝票のヘッダー情報と全明細（差異数含む）を取得する。
      tags: [inbound]
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: 入荷伝票詳細
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboundSlipDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: 伝票が存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notFound:
                  value:
                    errorCode: INBOUND_SLIP_NOT_FOUND
                    message: 指定された入荷伝票が見つかりません

    delete:
      operationId: deleteInboundSlip
      summary: 入荷予定削除
      description: ステータスがPLANNEDの入荷予定伝票を物理削除する。
      tags: [inbound]
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: 削除成功
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: 伝票が存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notFound:
                  value:
                    errorCode: INBOUND_SLIP_NOT_FOUND
                    message: 指定された入荷伝票が見つかりません
        '409':
          description: ステータスエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidStatus:
                  value:
                    errorCode: INBOUND_INVALID_STATUS
                    message: 現在のステータスではこの操作は実行できません

  /api/v1/inbound/slips/{id}/confirm:
    post:
      operationId: confirmInboundSlip
      summary: 入荷確認
      description: PLANNED状態の入荷予定伝票をCONFIRMED（入荷確認済）に遷移させる。
      tags: [inbound]
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: 確認成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboundSlipDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: 伝票が存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notFound:
                  value:
                    errorCode: INBOUND_SLIP_NOT_FOUND
                    message: 指定された入荷伝票が見つかりません
        '409':
          description: ステータスエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidStatus:
                  value:
                    errorCode: INBOUND_INVALID_STATUS
                    message: 現在のステータスではこの操作は実行できません

  /api/v1/inbound/slips/{id}/cancel:
    post:
      operationId: cancelInboundSlip
      summary: 入荷キャンセル
      description: |
        STORED・CANCELLED以外の入荷予定伝票をCANCELLEDに遷移させる。
        PARTIAL_STOREDの場合は入庫確定済み在庫を戻す処理を行う。
      tags: [inbound]
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: キャンセル成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboundSlipDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: 伝票が存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notFound:
                  value:
                    errorCode: INBOUND_SLIP_NOT_FOUND
                    message: 指定された入荷伝票が見つかりません
        '409':
          description: ステータスエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidStatus:
                  value:
                    errorCode: INBOUND_INVALID_STATUS
                    message: 現在のステータスではこの操作は実行できません

  /api/v1/inbound/slips/{id}/inspect:
    post:
      operationId: inspectInboundSlip
      summary: 検品登録
      description: |
        到着した入荷品を明細単位で検品し、実際の入荷数を記録する。
        初回呼び出し時にステータスがINSPECTINGに遷移する。検品数は再保存（上書き）可能。
      tags: [inbound]
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InspectInboundRequest'
      responses:
        '200':
          description: 検品登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboundSlipDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: 伝票または明細が存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                slipNotFound:
                  value:
                    errorCode: INBOUND_SLIP_NOT_FOUND
                    message: 指定された入荷伝票が見つかりません
                lineNotFound:
                  value:
                    errorCode: INBOUND_LINE_NOT_FOUND
                    message: 指定された入荷明細が見つかりません
        '409':
          description: ステータスエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidStatus:
                  value:
                    errorCode: INBOUND_INVALID_STATUS
                    message: 現在のステータスではこの操作は実行できません
        '422':
          description: 業務ルール違反
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                expiryDateExpired:
                  value:
                    errorCode: EXPIRY_DATE_EXPIRED
                    message: 賞味期限が営業日以前です

  /api/v1/inbound/slips/{id}/store:
    post:
      operationId: storeInboundSlip
      summary: 入庫確定
      description: |
        検品済み明細を指定ロケーションへ入庫確定する。
        確定と同時にinventoriesテーブルの在庫を加算し、inventory_movementsにINBOUNDレコードを追記する。
        全明細入庫完了でSTOREDに、一部の場合はPARTIAL_STOREDに遷移する。
      tags: [inbound]
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreInboundRequest'
      responses:
        '200':
          description: 入庫確定成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboundSlipDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: リソースが存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                slipNotFound:
                  value:
                    errorCode: INBOUND_SLIP_NOT_FOUND
                    message: 指定された入荷伝票が見つかりません
                lineNotFound:
                  value:
                    errorCode: INBOUND_LINE_NOT_FOUND
                    message: 指定された入荷明細が見つかりません
                locationNotFound:
                  value:
                    errorCode: LOCATION_NOT_FOUND
                    message: 指定されたロケーションが見つかりません
        '409':
          description: ステータスまたは在庫エラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidStatus:
                  value:
                    errorCode: INBOUND_INVALID_STATUS
                    message: 現在のステータスではこの操作は実行できません
                lineNotInspected:
                  value:
                    errorCode: INBOUND_LINE_NOT_INSPECTED
                    message: 対象明細が検品済みではありません
                stocktakeInProgress:
                  value:
                    errorCode: INVENTORY_STOCKTAKE_IN_PROGRESS
                    message: 指定ロケーションは棚卸中のためロックされています
        '422':
          description: 業務ルール違反
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                productMismatch:
                  value:
                    errorCode: LOCATION_PRODUCT_MISMATCH
                    message: 入庫先ロケーションに既に別商品の在庫が存在します
                areaMismatch:
                  value:
                    errorCode: INBOUND_LOCATION_AREA_MISMATCH
                    message: 指定ロケーションが入荷エリアに属していません

  /api/v1/inbound/results:
    get:
      operationId: listInboundResults
      summary: 入荷実績照会
      description: 入庫完了した入荷伝票の実績を明細レベルで照会する。
      tags: [inbound]
      parameters:
        - name: warehouseId
          in: query
          required: true
          schema:
            type: integer
            format: int64
          description: 倉庫ID
        - name: storedDateFrom
          in: query
          schema:
            type: string
            format: date
          description: 入庫日From（yyyy-MM-dd）。デフォルト：当月1日
        - name: storedDateTo
          in: query
          schema:
            type: string
            format: date
          description: 入庫日To（yyyy-MM-dd）。デフォルト：現在日
        - name: partnerId
          in: query
          schema:
            type: integer
            format: int64
          description: 仕入先ID
        - name: slipNumber
          in: query
          schema:
            type: string
          description: 伝票番号（前方一致）
        - name: productCode
          in: query
          schema:
            type: string
          description: 商品コード（前方一致）
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: sort
          in: query
          schema:
            type: string
            default: storedAt,desc
          description: ソート指定
      responses:
        '200':
          description: 入荷実績一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboundResultPageResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: 倉庫が存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                warehouseNotFound:
                  value:
                    errorCode: WAREHOUSE_NOT_FOUND
                    message: 指定された倉庫が見つかりません

components:
  # ============================================================
  # Security Schemes
  # ============================================================
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: access_token
      description: JWTアクセストークン（httpOnly Cookie）

  # ============================================================
  # Schemas
  # ============================================================
  schemas:
    # --- Auth Request/Response ---

    LoginRequest:
      type: object
      required: [userCode, password]
      properties:
        userCode:
          type: string
          maxLength: 50
          description: ログインID
          example: admin001
        password:
          type: string
          maxLength: 255
          description: パスワード（平文）
          example: password123

    LoginResponse:
      type: object
      required: [userId, userCode, fullName, role, passwordChangeRequired]
      properties:
        userId:
          type: integer
          format: int64
          description: ユーザーID
          example: 1
        userCode:
          type: string
          description: ユーザーコード
          example: admin001
        fullName:
          type: string
          description: 氏名
          example: 山田 太郎
        role:
          $ref: '#/components/schemas/UserRole'
        passwordChangeRequired:
          type: boolean
          description: パスワード変更要求フラグ。trueの場合、フロントエンドはパスワード変更画面に遷移する
          example: false

    RefreshResponse:
      type: object
      required: [userId, userCode, fullName, role]
      properties:
        userId:
          type: integer
          format: int64
          description: ユーザーID
          example: 1
        userCode:
          type: string
          description: ユーザーコード
          example: admin001
        fullName:
          type: string
          description: 氏名
          example: 山田 太郎
        role:
          $ref: '#/components/schemas/UserRole'

    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          maxLength: 255
          description: 現在のパスワード（平文）
        newPassword:
          type: string
          maxLength: 255
          description: 新しいパスワード（平文）。パスワードポリシーを満たすこと

    PasswordResetRequestBody:
      type: object
      required: [identifier]
      properties:
        identifier:
          type: string
          maxLength: 255
          description: ユーザーコードまたはメールアドレス
          example: admin001

    PasswordResetConfirmRequest:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
          description: パスワードリセットトークン（メールで受信したURL内のトークン）
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        newPassword:
          type: string
          maxLength: 255
          description: 新しいパスワード（平文）。パスワードポリシーを満たすこと

    # --- System ---

    BusinessDateResponse:
      type: object
      required: [businessDate]
      properties:
        businessDate:
          type: string
          format: date
          description: 現在の営業日（yyyy-MM-dd形式）
          example: '2026-03-13'

    # --- Common ---

    UserRole:
      type: string
      enum: [SYSTEM_ADMIN, WAREHOUSE_MANAGER, WAREHOUSE_STAFF, VIEWER]
      description: ユーザーロール

    ErrorResponse:
      type: object
      required: [errorCode, message]
      properties:
        errorCode:
          type: string
          description: エラーコード
          example: VALIDATION_ERROR
        message:
          type: string
          description: エラーメッセージ
          example: 入力内容に誤りがあります
        details:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'
          description: フィールドレベルのバリデーションエラー詳細（VALIDATION_ERRORの場合のみ）

    FieldError:
      type: object
      required: [field, message]
      properties:
        field:
          type: string
          description: エラーが発生したフィールド名
          example: userCode
        message:
          type: string
          description: フィールドのエラーメッセージ
          example: 必須項目です

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          description: メッセージ

    ExistsResponse:
      type: object
      required: [exists]
      properties:
        exists:
          type: boolean
          description: 存在する場合true

    CountResponse:
      type: object
      required: [count]
      properties:
        count:
          type: integer
          description: 件数

    # --- Facility Master: Enums ---

    StorageCondition:
      type: string
      enum: [AMBIENT, REFRIGERATED, FROZEN]
      description: 保管条件（常温・冷蔵・冷凍）

    AreaType:
      type: string
      enum: [STOCK, INBOUND, OUTBOUND, RETURN]
      description: エリア種別（在庫・入荷・出荷・返品）

    # --- Facility Master: Common ---

    ToggleActiveRequest:
      type: object
      required: [isActive, version]
      properties:
        isActive:
          type: boolean
          description: falseで無効化、trueで有効化
        version:
          type: integer
          description: 楽観的ロックバージョン

    # --- Facility Master: Warehouse ---

    CreateWarehouseRequest:
      type: object
      required: [warehouseCode, warehouseName]
      properties:
        warehouseCode:
          type: string
          pattern: '^[A-Z]{4}$'
          description: 倉庫コード（英大文字4文字固定・登録後変更不可）
          example: WARA
        warehouseName:
          type: string
          maxLength: 200
          description: 倉庫名
          example: 東京DC
        warehouseNameKana:
          type: string
          maxLength: 200
          description: 倉庫名カナ
          example: トウキョウディーシー
        address:
          type: string
          maxLength: 500
          description: 住所
          example: 東京都江東区辰巳1-1-1

    UpdateWarehouseRequest:
      type: object
      required: [warehouseName, version]
      properties:
        warehouseName:
          type: string
          maxLength: 200
          description: 倉庫名
        warehouseNameKana:
          type: string
          maxLength: 200
          description: 倉庫名カナ
        address:
          type: string
          maxLength: 500
          description: 住所
        version:
          type: integer
          description: 楽観的ロックバージョン

    WarehouseDetail:
      type: object
      required: [id, warehouseCode, warehouseName, isActive, version, createdAt, updatedAt]
      properties:
        id:
          type: integer
          format: int64
        warehouseCode:
          type: string
        warehouseName:
          type: string
        warehouseNameKana:
          type: string
        address:
          type: string
        isActive:
          type: boolean
        version:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    WarehouseSimple:
      type: object
      required: [id, warehouseCode, warehouseName, isActive]
      properties:
        id:
          type: integer
          format: int64
        warehouseCode:
          type: string
        warehouseName:
          type: string
        isActive:
          type: boolean

    WarehousePageResponse:
      type: object
      required: [content, page, size, totalElements, totalPages]
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/WarehouseListItem'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer

    WarehouseListItem:
      type: object
      required: [id, warehouseCode, warehouseName, isActive, createdAt, updatedAt]
      properties:
        id:
          type: integer
          format: int64
        warehouseCode:
          type: string
        warehouseName:
          type: string
        warehouseNameKana:
          type: string
        address:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    WarehouseToggleResponse:
      type: object
      required: [id, warehouseCode, warehouseName, isActive, version, updatedAt]
      properties:
        id:
          type: integer
          format: int64
        warehouseCode:
          type: string
        warehouseName:
          type: string
        isActive:
          type: boolean
        version:
          type: integer
        updatedAt:
          type: string
          format: date-time

    # --- Facility Master: Building ---

    CreateBuildingRequest:
      type: object
      required: [warehouseId, buildingCode, buildingName]
      properties:
        warehouseId:
          type: integer
          format: int64
          description: 所属倉庫ID
        buildingCode:
          type: string
          maxLength: 10
          pattern: '^[A-Za-z0-9]+$'
          description: 棟コード（倉庫内一意・変更不可）
          example: A
        buildingName:
          type: string
          maxLength: 200
          description: 棟名称
          example: A棟

    UpdateBuildingRequest:
      type: object
      required: [buildingName, version]
      properties:
        buildingName:
          type: string
          maxLength: 200
          description: 棟名称
        version:
          type: integer
          description: 楽観的ロックバージョン

    BuildingDetail:
      type: object
      required: [id, buildingCode, buildingName, warehouseId, warehouseCode, isActive, version, createdAt, updatedAt]
      properties:
