            $ref: '#/components/schemas/ReleasedSlipDetail'

  # ============================================================
  # Parameters
  # ============================================================
  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: リソースID

    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
      description: ページ番号（0始まり）

    SizeParam:
      name: size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: ページサイズ

    ReportFormat:
      name: format
      in: query
      schema:
        $ref: '#/components/schemas/ReportFormat'
      description: 出力フォーマット（json/csv/pdf）

  # ============================================================
  # Reusable Responses
  # ============================================================
  responses:
    ValidationError:
      description: バリデーションエラー
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            validationError:
              value:
                errorCode: VALIDATION_ERROR
                message: 入力内容に誤りがあります
                details:
                  - field: userCode
                    message: 必須項目です

    Unauthorized:
      description: 認証エラー
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            unauthorized:
              value:
                errorCode: UNAUTHORIZED
                message: 認証が必要です

    Forbidden:
      description: 権限不足
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            forbidden:
              value:
                errorCode: FORBIDDEN
                message: この操作を実行する権限がありません

    InvalidParameter:
      description: クエリパラメータ不正
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalidParameter:
              value:
                errorCode: INVALID_PARAMETER
                message: クエリパラメータが不正です

    OptimisticLockConflict:
      description: 楽観的ロック競合
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            conflict:
              value:
                errorCode: OPTIMISTIC_LOCK_CONFLICT
                message: 他のユーザーによる更新が先行しました。最新データを取得してから再度お試しください

security:
  - cookieAuth: []
