      operationId: getSystemParameters
      description: システムパラメータの一覧を取得する。SYSTEM_ADMIN専用。
      responses:
        '200':
          description: パラメータ一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SystemParameterDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/system/parameters/{paramKey}:
    put:
      tags: [system-parameter]
      summary: パラメータ値更新
      operationId: updateSystemParameter
      description: 指定したパラメータキーの値を更新する。SYSTEM_ADMIN専用。
      parameters:
        - name: paramKey
          in: path
          required: true
          schema:
            type: string
          description: パラメータキー
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSystemParameterRequest'
      responses:
        '200':
          description: 更新後のパラメータ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemParameterDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: パラメータが存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notFound:
                  value:
                    errorCode: PARAM_NOT_FOUND
                    message: 指定されたパラメータキーが見つかりません

  # ============================================================
  # ALLOCATION - 在庫引当
  # ============================================================
  /api/v1/allocation/orders:
    get:
      operationId: getAllocationOrders
      summary: 引当対象受注一覧取得
      description: 引当対象となる受注（ステータスがORDEREDまたはPARTIAL_ALLOCATED）をページング形式で取得する
      tags: [allocation]
      parameters:
        - name: warehouseId
          in: query
          required: true
          schema:
            type: integer
            format: int64
          description: 倉庫ID
        - name: status
          in: query
          schema:
            type: array
            items:
              type: string
              enum: [ORDERED, PARTIAL_ALLOCATED]
          description: ステータス（複数指定可）
        - name: shippingDateFrom
          in: query
          schema:
            type: string
            format: date
          description: 出荷予定日の開始日
        - name: shippingDateTo
          in: query
          schema:
            type: string
            format: date
          description: 出荷予定日の終了日
        - name: partnerName
          in: query
          schema:
            type: string
          description: 出荷先名（部分一致）
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: sort
          in: query
          schema:
            type: string
            default: plannedDate,asc
          description: ソート指定
      responses:
        '200':
          description: 引当対象受注一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AllocationOrderPageResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/allocation/execute:
    post:
      operationId: executeAllocation
      summary: 引当実行
      description: 選択された受注に対して在庫引当を実行する。FIFO/FEFO方式で在庫を引き当て、荷姿変換が必要な場合はばらし指示を自動生成する
      tags: [allocation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecuteAllocationRequest'
      responses:
        '200':
          description: 引当実行結果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AllocationExecutionResult'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: 出荷伝票が存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/allocation/unpack-instructions:
    get:
      operationId: getUnpackInstructions
      summary: ばらし指示一覧取得
      description: ばらし指示の一覧を取得する。出荷伝票IDやステータスでの絞り込みが可能
      tags: [allocation]
      parameters:
        - name: outboundSlipId
          in: query
          schema:
            type: integer
            format: int64
          description: 出荷伝票IDで絞り込み
        - name: status
          in: query
          schema:
            type: string
            enum: [INSTRUCTED, COMPLETED]
          description: ステータス
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: ばらし指示一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnpackInstructionPageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/allocation/unpack-instructions/{id}/complete:
    put:
      operationId: completeUnpackInstruction
      summary: ばらし完了
      description: ばらし指示を完了し、在庫の荷姿変換を確定する。元荷姿の在庫を減算し、先荷姿の在庫を加算する
      tags: [allocation]
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: ばらし完了結果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnpackCompletionResult'
        '400':
          description: 既に完了済みのばらし指示
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: ばらし指示が存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/allocation/allocated-orders:
    get:
      operationId: getAllocatedOrders
      summary: 引当済み受注一覧取得
      description: 引当済み（ALLOCATEDまたはPARTIAL_ALLOCATED）の受注一覧をページング形式で取得する
      tags: [allocation]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: sort
          in: query
