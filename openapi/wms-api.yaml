                partnerNotFound:
                  value:
                    errorCode: PARTNER_NOT_FOUND
                    message: 指定された取引先が見つかりません
                productNotFound:
                  value:
                    errorCode: PRODUCT_NOT_FOUND
                    message: 指定された商品が見つかりません
        '422':
