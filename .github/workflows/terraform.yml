name: Terraform

on:
  pull_request:
    paths:
      - 'infra/**'
  push:
    branches: [main]
    paths:
      - 'infra/**'
  workflow_dispatch:
    inputs:
      action:
        description: '実行するアクション'
        required: true
        type: choice
        options:
          - plan
          - apply
      environment:
        description: '対象環境'
        required: true
        type: choice
        options:
          - dev
          - prd

env:
  TF_VERSION: '1.7'
  # ARM_SUBSCRIPTION_ID is used for Terraform backend (tfstate) access.
  # Each environment's provider subscription_id is set in terraform.tfvars.
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  TF_VAR_db_admin_password: ${{ secrets.TF_VAR_DB_ADMIN_PASSWORD }}
  TF_VAR_jwt_secret: ${{ secrets.TF_VAR_JWT_SECRET }}

jobs:
  terraform:
    name: Terraform (${{ matrix.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # PR/push: dev,prd両方  |  手動: 選択した環境のみ
    strategy:
      matrix:
        environment: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', inputs.environment)) || fromJSON('["dev","prd"]') }}

    defaults:
      run:
        working-directory: infra/environments/${{ matrix.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      # --- Plan ---
      # PR時: 常にplan  |  手動時: action=plan or action=apply
      - name: Terraform Plan
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        id: plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planExitCode = '${{ steps.plan.outcome }}';
            const statusIcon = planExitCode === 'success' ? '✅' : '❌';
            let planOutput = '';
            try {
              planOutput = fs.readFileSync('infra/environments/${{ matrix.environment }}/plan_output.txt', 'utf8');
            } catch (e) {
              planOutput = 'Plan output not available.';
            }
            const truncated = planOutput.length > 60000
              ? planOutput.substring(0, 60000) + '\n... (truncated)'
              : planOutput;
            const output = `#### ${statusIcon} Terraform Plan - ${{ matrix.environment }}
            \`\`\`
            ${truncated}
            \`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Fail if Plan Failed
        if: (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') && steps.plan.outcome == 'failure'
        run: exit 1

      # --- Upload plan for prd apply job ---
      - name: Upload Plan Artifact
        if: matrix.environment == 'prd' && steps.plan.outcome == 'success' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.action == 'apply'))
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-prd
          path: infra/environments/prd/tfplan
          retention-days: 1

      # --- Apply ---
      # push時: devのみ自動apply  |  手動時: action=apply の場合
      - name: Terraform Apply (auto - dev on push)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.environment == 'dev'
        run: terraform apply -auto-approve

      - name: Terraform Apply (manual - dev)
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'apply' && matrix.environment == 'dev'
        run: terraform apply tfplan

  # --- prd Apply (承認ゲート付き) ---
  terraform-apply-prd:
    name: Terraform Apply (prd)
    needs: terraform
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.action == 'apply' && inputs.environment == 'prd')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    defaults:
      run:
        working-directory: infra/environments/prd

    env:
      TF_VERSION: '1.7'
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      TF_VAR_db_admin_password: ${{ secrets.TF_VAR_DB_ADMIN_PASSWORD }}
      TF_VAR_jwt_secret: ${{ secrets.TF_VAR_JWT_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-prd
          path: infra/environments/prd

      - name: Terraform Apply
        run: terraform apply tfplan
