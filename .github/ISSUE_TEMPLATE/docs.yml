name: ドキュメント
description: ドキュメントの追加・修正
labels: ["docs"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 何を追加・修正するか簡潔に記載
    validations:
      required: true
  - type: textarea
    id: purpose
    attributes:
      label: 目的
      description: なぜこの変更が必要か
    validations:
      required: true
  - type: textarea
    id: tasks
    attributes:
      label: タスク一覧
      description: 作業タスクをチェックリスト形式で記載
      value: |
        - [ ]
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: 備考
    validations:
      required: false
