spring:
  datasource:
    url: jdbc:h2:mem:wms_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

jwt:
  secret-key: test-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
  access-token-expiration: 3600000
  refresh-token-expiration: 86400000

cookie:
  secure: false

cors:
  allowed-origins: http://localhost:5173
