<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${reportTitle}">返品レポート</title>
    <th:block th:replace="~{reports/_base-layout :: common-styles('A4', 'landscape')}" />
    <style>
        .col-no { width: 8mm; }
        .col-slip { width: 35mm; }
        .col-date { width: 25mm; }
        .col-product-code { width: 25mm; }
        .col-product-name { width: 45mm; }
        .col-qty { width: 20mm; }
        .col-unit { width: 15mm; }
        .col-reason { width: 35mm; }
        .col-related { width: 35mm; }
        .col-partner { width: 34mm; }
    </style>
</head>
<body>
    <div th:replace="~{reports/_base-layout :: report-header}" />

    <div th:if="${items.isEmpty()}" th:replace="~{reports/_base-layout :: no-data-message}" />

    <th:block th:if="${!items.isEmpty()}">
        <th:block th:with="groups=${items.stream().collect(T(java.util.stream.Collectors).groupingBy(item -> item.returnTypeLabel != null ? item.returnTypeLabel : '（種別不明）', T(java.util.LinkedHashMap)::new, T(java.util.stream.Collectors).toList()))}">
            <table>
                <thead>
                    <tr>
                        <th class="col-no">No.</th>
                        <th class="col-slip">返品伝票番号</th>
                        <th class="col-date">返品日</th>
                        <th class="col-product-code">商品コード</th>
                        <th class="col-product-name">商品名</th>
                        <th class="col-qty">数量</th>
                        <th class="col-unit">荷姿</th>
                        <th class="col-reason">返品理由</th>
                        <th class="col-related">関連伝票番号</th>
                        <th class="col-partner">仕入先名</th>
                    </tr>
                </thead>
                <tbody th:each="entry : ${groups.entrySet()}">
                    <!-- グループヘッダー -->
                    <tr class="group-header">
                        <td colspan="10" th:text="'返品種別: ' + ${entry.key}">返品種別: 入荷返品</td>
                    </tr>
                    <!-- 明細行 -->
                    <tr th:each="item, stat : ${entry.value}">
                        <td class="text-right" th:text="${stat.count}">1</td>
                        <td th:text="${item.returnNumber}">RTN-2026-0010</td>
                        <td class="text-center" th:text="${item.returnDate != null ? #temporals.format(item.returnDate, 'yyyy-MM-dd') : '—'}">2026-03-05</td>
                        <td th:text="${item.productCode}">P-001</td>
                        <td th:text="${item.productName}">商品A</td>
                        <td class="text-right" th:text="${#numbers.formatInteger(item.quantity, 1, 'COMMA')}">10</td>
                        <td class="text-center" th:text="${item.unitType != null ? item.unitType : '—'}">CAS</td>
                        <td th:text="${item.returnReasonLabel != null ? item.returnReasonLabel : '—'}">品質不良</td>
                        <td th:text="${item.relatedSlipNumber != null ? item.relatedSlipNumber : '—'}">INB-2026-0120</td>
                        <td th:text="${item.partnerName != null ? item.partnerName : '—'}">仕入先A</td>
                    </tr>
                    <!-- 小計行 -->
                    <tr class="subtotal-row">
                        <td colspan="4"></td>
                        <td th:text="'小計（' + ${entry.value.size()} + '件）'">小計（2件）</td>
                        <td class="text-right" th:text="${#numbers.formatInteger(#aggregates.sum(entry.value.![quantity]), 1, 'COMMA')}">15</td>
                        <td colspan="4"></td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr class="total-row">
                        <td colspan="4"></td>
                        <td th:text="'合計（' + ${items.size()} + '件）'">合計（3件）</td>
                        <td class="text-right" th:text="${#numbers.formatInteger(#aggregates.sum(items.![quantity]), 1, 'COMMA')}">18</td>
                        <td colspan="4"></td>
                    </tr>
                </tfoot>
            </table>
        </th:block>
    </th:block>
</body>
</html>
