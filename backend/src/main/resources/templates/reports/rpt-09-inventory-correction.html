<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${reportTitle}">在庫訂正一覧</title>
    <th:block th:replace="~{reports/_base-layout :: common-styles('A4', 'landscape')}" />
    <style>
        .col-no { width: 10mm; }
        .col-date { width: 25mm; }
        .col-location { width: 35mm; }
        .col-product-code { width: 25mm; }
        .col-product-name { width: 55mm; }
        .col-unit { width: 15mm; }
        .col-qty { width: 22mm; }
        .col-reason { width: 46mm; }
        .highlight-increase { background: #F0F4FF; }
        .highlight-decrease { background: #FFF1F1; }
    </style>
</head>
<body>
    <div th:replace="~{reports/_base-layout :: report-header}" />

    <div th:if="${items.isEmpty()}" th:replace="~{reports/_base-layout :: no-data-message}" />

    <table th:if="${!items.isEmpty()}">
        <thead>
            <tr>
                <th class="col-no">No.</th>
                <th class="col-date">訂正日</th>
                <th class="col-location">ロケーション</th>
                <th class="col-product-code">商品コード</th>
                <th class="col-product-name">商品名</th>
                <th class="col-unit">荷姿</th>
                <th class="col-qty">訂正前</th>
                <th class="col-qty">訂正後</th>
                <th class="col-qty">変動数</th>
                <th class="col-reason">訂正理由</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="item, stat : ${items}"
                th:classappend="${item.quantityChange > 0 ? 'highlight-increase' : (item.quantityChange < 0 ? 'highlight-decrease' : '')}">
                <td class="text-right" th:text="${stat.count}">1</td>
                <td class="text-center" th:text="${#temporals.format(item.correctionDate, 'yyyy-MM-dd')}">2026-03-05</td>
                <td th:text="${item.locationCode}">A-01-A-01</td>
                <td th:text="${item.productCode}">P-001</td>
                <td th:text="${item.productName}">商品A</td>
                <td class="text-center" th:text="${item.unitType}">CAS</td>
                <td class="text-right" th:text="${#numbers.formatInteger(item.quantityBefore, 1, 'COMMA')}">10</td>
                <td class="text-right" th:text="${#numbers.formatInteger(item.quantityAfter, 1, 'COMMA')}">9</td>
                <td class="text-right" th:text="${(item.quantityChange > 0 ? '+' : '') + #numbers.formatInteger(item.quantityChange, 1, 'COMMA')}">-1</td>
                <td th:text="${(item.reason != null ? item.reason : '') + (item.operatorName != null ? '（' + item.operatorName + '）' : '')}">棚卸差異調整（田中 太郎）</td>
            </tr>
        </tbody>
        <tfoot>
            <tr class="total-row">
                <td colspan="4"></td>
                <td>合計</td>
                <td colspan="3"></td>
                <td class="text-right" th:text="${(#aggregates.sum(items.![quantityChange]) > 0 ? '+' : '') + #numbers.formatInteger(#aggregates.sum(items.![quantityChange]), 1, 'COMMA')}">+1</td>
                <td></td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
