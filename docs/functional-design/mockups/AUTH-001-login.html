<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AUTH-001 ログイン — WMS</title>
  <style>
    /* === WMS Design System (inline) === */
    :root {
      --color-primary: #A100FF; --color-primary-dark: #460073; --color-primary-mid: #7500C0;
      --color-primary-light: #E8AAFF; --color-primary-bg: #F5E6FF;
      --color-black: #000000; --color-white: #FFFFFF;
      --color-gray-100: #F4F4F4; --color-gray-200: #E8E8E8; --color-gray-300: #D4D4D4;
      --color-gray-400: #ABABAB; --color-gray-500: #848484; --color-gray-600: #636363;
      --color-gray-700: #454545; --color-gray-800: #262626; --color-gray-900: #161616;
      --color-error: #DA1E28; --color-error-bg: #FFF1F1;
      --font-family: 'Graphik', 'Inter', 'Noto Sans JP', Arial, sans-serif;
      --border-radius: 4px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: var(--font-family); }

    /* === Page Layout === */
    .login-page {
      display: flex;
      height: 100vh;
    }

    /* === Left Panel (Brand) === */
    .brand-panel {
      flex: 0 0 45%;
      background: var(--color-black);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 48px 56px;
      position: relative;
      overflow: hidden;
    }
    .brand-panel::before {
      content: '';
      position: absolute;
      top: -180px; right: -120px;
      width: 480px; height: 480px;
      background: radial-gradient(circle, rgba(161,0,255,0.35) 0%, transparent 70%);
      pointer-events: none;
    }
    .brand-panel::after {
      content: '';
      position: absolute;
      bottom: -100px; left: -80px;
      width: 340px; height: 340px;
      background: radial-gradient(circle, rgba(116,0,192,0.25) 0%, transparent 70%);
      pointer-events: none;
    }
    .brand-logo {
      font-size: 28px; font-weight: 800; color: var(--color-white);
      letter-spacing: -1px; position: relative; z-index: 1;
    }
    .brand-logo .accent { color: var(--color-primary); }
    .brand-body {
      position: relative; z-index: 1;
    }
    .brand-headline {
      font-size: 42px; font-weight: 800; color: var(--color-white);
      line-height: 1.1; margin-bottom: 20px; letter-spacing: -1.5px;
    }
    .brand-headline .highlight {
      background: linear-gradient(90deg, var(--color-primary), var(--color-primary-light));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .brand-sub {
      font-size: 15px; color: var(--color-gray-400); line-height: 1.6;
      max-width: 320px;
    }
    .brand-footer {
      font-size: 12px; color: var(--color-gray-600); position: relative; z-index: 1;
    }

    /* === Right Panel (Form) === */
    .form-panel {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-white);
      padding: 48px;
    }
    .login-box {
      width: 100%;
      max-width: 400px;
    }
    .login-title {
      font-size: 26px; font-weight: 700; color: var(--color-gray-900);
      margin-bottom: 8px;
    }
    .login-subtitle {
      font-size: 14px; color: var(--color-gray-500); margin-bottom: 36px;
    }

    /* Form */
    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block; font-size: 13px; font-weight: 600;
      color: var(--color-gray-700); margin-bottom: 6px;
    }
    .form-input {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid var(--color-gray-300); border-radius: var(--border-radius);
      font-family: var(--font-family); font-size: 14px;
      color: var(--color-gray-900); background: var(--color-white);
      transition: border-color 0.15s, box-shadow 0.15s; outline: none;
    }
    .form-input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(161,0,255,0.12);
    }
    .form-input::placeholder { color: var(--color-gray-400); }

    /* Error state */
    .form-input.error { border-color: var(--color-error); }
    .form-error-msg {
      display: flex; align-items: center; gap: 6px;
      margin-top: 6px; font-size: 12px; color: var(--color-error);
    }

    /* Alert */
    .alert-error {
      display: flex; align-items: flex-start; gap: 10px;
      background: var(--color-error-bg); border: 1px solid #FFB3B8;
      border-radius: var(--border-radius); padding: 12px 14px;
      margin-bottom: 24px; font-size: 13px; color: #A2191F;
    }
    .alert-icon { font-size: 16px; line-height: 1; flex-shrink: 0; }

    /* Submit */
    .btn-login {
      width: 100%; padding: 13px;
      background: var(--color-primary); color: var(--color-white);
      border: none; border-radius: var(--border-radius);
      font-family: var(--font-family); font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background 0.15s; margin-top: 8px; letter-spacing: 0.3px;
    }
    .btn-login:hover { background: var(--color-primary-mid); }
    .btn-login:active { background: var(--color-primary-dark); }

    /* Version note */
    .version-note {
      margin-top: 32px; font-size: 12px; color: var(--color-gray-400);
      text-align: center;
    }

    /* === State annotations (design doc only) === */
    .state-label {
      display: inline-block; background: #E8E8E8; color: #454545;
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 999px;
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px;
    }
    .state-tabs {
      display: flex; gap: 8px; margin-bottom: 32px;
    }
    .state-tab {
      padding: 5px 14px; border-radius: 999px; font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1.5px solid transparent;
    }
    .state-tab.active-tab { background: var(--color-primary); color: white; }
    .state-tab.inactive-tab { background: transparent; border-color: var(--color-gray-300); color: var(--color-gray-600); }

    /* === Mockup frame === */
    .mockup-meta {
      position: fixed; top: 0; left: 0; right: 0;
      background: #1A1A2E; color: #AAA; font-size: 11px;
      padding: 4px 16px; display: flex; gap: 24px; align-items: center; z-index: 999;
    }
    .mockup-meta .screen-id { color: var(--color-primary-light); font-weight: 700; }
    body { padding-top: 24px; }
    .login-page { height: calc(100vh - 24px); }
  </style>
</head>
<body>

  <!-- Mockup metadata bar (design doc only) -->
  <div class="mockup-meta">
    <span class="screen-id">AUTH-001</span>
    <span>ログイン</span>
    <span style="color:#555">|</span>
    <span>URL: /login</span>
    <span style="color:#555">|</span>
    <span>対象ロール: 全ユーザー（未認証）</span>
  </div>

  <div class="login-page">

    <!-- Left: Brand Panel -->
    <div class="brand-panel">
      <div class="brand-logo">W<span class="accent">M</span>S</div>

      <div class="brand-body">
        <h1 class="brand-headline">
          倉庫管理<br>
          <span class="highlight">システム</span>
        </h1>
        <p class="brand-sub">
          入荷・在庫・出荷・バッチ処理をひとつのプラットフォームで管理する、
          モダンな倉庫管理ソリューション。
        </p>
      </div>

      <div class="brand-footer">
        © 2025 WMS ShowCase Project
      </div>
    </div>

    <!-- Right: Login Form -->
    <div class="form-panel">
      <div class="login-box">

        <!-- State selector (design doc only) -->
        <div class="state-tabs">
          <span class="state-tab active-tab">通常</span>
          <span class="state-tab inactive-tab">ログイン失敗</span>
          <span class="state-tab inactive-tab">ロック</span>
        </div>

        <h2 class="login-title">ログイン</h2>
        <p class="login-subtitle">ユーザーコードとパスワードを入力してください</p>

        <!-- Error alert (shown on login failure) -->
        <!-- <div class="alert-error">
          <span class="alert-icon">⚠</span>
          <span>ユーザーコードまたはパスワードが正しくありません。（残り <strong>4</strong> 回でアカウントがロックされます）</span>
        </div> -->

        <!-- Form -->
        <div class="form-group">
          <label class="form-label">ユーザーコード</label>
          <input type="text" class="form-input" placeholder="例: yamada.taro" value="">
        </div>

        <div class="form-group">
          <label class="form-label">パスワード</label>
          <input type="password" class="form-input" placeholder="パスワードを入力" value="">
        </div>

        <button class="btn-login">ログイン</button>

        <p style="margin-top: 16px; text-align: center;">
          <a href="AUTH-003-password-reset-request.html" style="font-size: 13px; color: #A100FF; text-decoration: none;">パスワードを忘れた方</a>
        </p>

        <p class="version-note">WMS v1.0 — ログインでお困りの場合はシステム管理者にお問い合わせください</p>

      </div>
    </div>

  </div>

</body>
</html>
